services:
  api:
    build:
      context: .. 
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      # Syncs your local code/data so you don't have to rebuild on every save
      - ../services:/app/services
      - ../data:/app/data
      - ../scripts:/app/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

  redis:
    image: redis:7-alpine

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    volumes:
      - ../services:/app/services
      - ../data:/app/data
    depends_on:
      - redis
    command: celery -A services.worker.celery_app:celery_app worker --loglevel=info --pool=threads --concurrency=4